<!doctype html>
<html>
  <head>
    <title>Controle IoT</title>
  </head>
  <body>
    <h1>Controle do LED</h1>

    <button onclick="ligar()">Ligar</button>
    <button onclick="desligar()">Desligar</button>

    <script src="https://unpkg.com/paho-mqtt/mqttws31.min.js"></script>

    <script>
      const BROKER = "broker.emqx.io";
      const PORT = 8084;
      const TOPIC = "frankai/led";

      const client = new Paho.MQTT.Client(
        BROKER,
        PORT,
        "web_" + Math.floor(Math.random() * 10000),
      );

      let conectado = false;

      client.onConnectionLost = (res) => {
        console.log("Conexão perdida", res);
        conectado = false;
      };

      function conectar() {
        client.connect({
          useSSL: true,
          onSuccess: () => {
            console.log("Conectado!");
            conectado = true;
          },
          onFailure: (err) => {
            console.log("Erro:", err);
            setTimeout(conectar, 2000);
          },
        });
      }

      conectar();

      function enviar(valor) {
        if (!conectado) {
          console.log("Não conectado");
          return;
        }

        const msg = new Paho.MQTT.Message(valor);
        msg.destinationName = TOPIC;

        client.send(msg);
        console.log("Enviado:", valor);
      }

      function ligar() {
        enviar("1");
      }

      function desligar() {
        enviar("0");
      }
    </script>
  </body>
</html>
