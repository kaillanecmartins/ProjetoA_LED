<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Controle IoT</title>
  </head>
  <body>
    <h1>Controle do LED</h1>

    <button onclick="ligar()">Ligar</button>
    <button onclick="desligar()">Desligar</button>

    <script src="https://unpkg.com/paho-mqtt/mqttws31.min.js"></script>

    <script>
      const BROKER = "broker.hivemq.com";
      const PORT = 8884;
      const TOPIC = "frankai/led";

      const clientID = "web_" + Math.floor(Math.random() * 10000);

      const client = new Paho.MQTT.Client(BROKER, PORT, clientID);

      let conectado = false;

      client.onConnectionLost = function (responseObject) {
        console.log("Conexão perdida:", responseObject);
        conectado = false;
      };

      client.onMessageArrived = function (message) {
        console.log("Mensagem recebida:", message.payloadString);
      };

      function conectarMQTT() {
        console.log("Tentando conectar ao broker...");

        client.connect({
          useSSL: true,
          timeout: 5,
          onSuccess: () => {
            console.log("Conectado ao broker MQTT");
            conectado = true;
          },
          onFailure: (err) => {
            console.log("Erro ao conectar:", err);
            conectado = false;

            setTimeout(conectarMQTT, 2000);
          },
        });
      }

      conectarMQTT();

      function enviarMensagem(valor) {
        if (!conectado) {
          console.log("Ainda não conectado ao broker");
          return;
        }

        const message = new Paho.MQTT.Message(valor);
        message.destinationName = TOPIC;

        client.send(message);
        console.log("Mensagem enviada:", valor);
      }

      function ligar() {
        console.log("Botão Ligar clicado");
        enviarMensagem("1");
      }

      function desligar() {
        console.log("Botão Desligar clicado");
        enviarMensagem("0");
      }
    </script>
  </body>
</html>
